meta:
  name: "Persistence via Scheduled Task + C2 Beaconing"
  difficulty: medium
  answer: INCIDENT
  mitre_techniques:
    - id: T1053.005
      name: "Scheduled Task/Job: Scheduled Task"
    - id: T1059.001
      name: "Command and Scripting Interpreter: PowerShell"
    - id: T1071.001
      name: "Application Layer Protocol: Web Protocols"
  hint: "A scheduled task created by a regular user account that runs PowerShell with encoded commands or -WindowStyle Hidden is a persistence red flag. Legitimate scheduled tasks are created by IT/SYSTEM with documented change tickets, point to known binaries, and do not beacon to external IPs. The regular HTTP POST pattern after task creation confirms C2 — beacon intervals are often fixed (every 60s, 300s) while normal browsing is irregular. Check task name and action path for randomness."
  alert:
    rule_id: PERSISTENCE_DETECTED
    severity: MEDIUM
    summary: "Suspicious scheduled task created on {inject_malicious_host} by {inject_malicious_user} — task action executes encoded PowerShell"
    description: "Scheduled task rule fired: new task registered with a PowerShell encoded command or hidden window action. This pattern is consistent with attackers establishing persistent C2 callbacks. Review task details and subsequent network activity from the affected host."

world_overrides:
  attacker_ip: "185.220.101.99"
  inject_malicious_host: "WS014"
  inject_malicious_user: "peter.novak"

phases:
  phase_1:
    name: "Persistence: Scheduled Task Registration"
    technique: T1053.005
    count: 1
    log_factory: scheduled_task_created
    spread_seconds: 5
    delay_after_prev: [2, 8]
    params:
      target_user: "{inject_malicious_user}"
      dest_host: "{inject_malicious_host}"

  phase_2:
    name: "Execution: Scheduled Task Payload Runs"
    technique: T1059.001
    count: 3
    log_factory: sysmon.process_create
    spread_seconds: 300
    delay_after_prev: [60, 120]
    params:
      dest_host: "{inject_malicious_host}"
      source_ip: "{attacker_ip}"
      target_user: "{inject_malicious_user}"
      command_line:
        - "powershell.exe -NoP -W Hidden -Enc UwB0AGEAcgB0AC0AUwBsAGUAZQBwACAALQBTAGUAYwBvAG4AZABzACAAMwA="
        - "powershell.exe -WindowStyle Hidden -ExecutionPolicy Bypass -File C:\\Windows\\Temp\\update.ps1"
        - "powershell.exe -NoProfile -NonInteractive -c \"& C:\\ProgramData\\MicrosoftEdge\\msupdate.exe\""

  phase_3:
    name: "C2: HTTP Beaconing at Regular Intervals"
    technique: T1071.001
    count: 5
    log_factory: proxy.http_request
    spread_seconds: 600
    delay_after_prev: [55, 65]
    params:
      source_ip: "{attacker_ip}"
      url: "http://185.220.101.99/updates/check"
      method: POST
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
