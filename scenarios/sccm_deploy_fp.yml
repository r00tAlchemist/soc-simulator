meta:
  name: "FP — SCCM Software Deployment"
  difficulty: easy
  answer: FP
  mitre_techniques: []
  hint: "CCMExec.exe is the SCCM Configuration Manager client agent — it is a Microsoft-signed binary deployed on all managed endpoints. File writes under C:\\Windows\\ccmcache\\ are the SCCM download cache directory for software packages before installation. msiexec.exe /quiet is normal silent software deployment behaviour. The source IP (10.0.1.30) is the SCCM management point. Compare to the malicious PERSISTENCE_DETECTED scenario where tasks run PowerShell with encoded commands — here the task runs a known signed installer. Check the SCCM console for the deployment collection and package ID."
  alert:
    rule_id: PERSISTENCE_DETECTED
    severity: LOW
    summary: "New process execution and file writes detected on {inject_malicious_host} by {inject_malicious_user} via remote service — possible software installation or persistence"
    description: "Scheduled task and service execution rule fired: CCMExec-style processes creating files and invoking msiexec on a target workstation. While this matches SCCM deployment behaviour, the same pattern is used by malicious software to persist. Verify the source is the SCCM management point and the package is in the approved software catalogue."

world_overrides:
  attacker_ip: "10.0.1.30"
  inject_malicious_host: "WS010"
  inject_malicious_user: "svc_deploy"

phases:
  phase_1:
    name: "SCCM: Agent and Installer Execution"
    technique: ""
    count: 4
    log_factory: sysmon.process_create
    spread_seconds: 120
    delay_after_prev: [5, 20]
    params:
      dest_host: "{inject_malicious_host}"
      source_ip: "{attacker_ip}"
      target_user: "{inject_malicious_user}"
      command_line:
        - "C:\\Windows\\CCM\\CcmExec.exe"
        - "msiexec.exe /i C:\\Windows\\ccmcache\\1\\7-Zip-23.01-x64.msi /quiet /norestart ALLUSERS=1"
        - "C:\\Windows\\CCM\\ccmsetup.exe /mp:10.0.1.30 SMSSITECODE=P01"
        - "msiexec.exe /i C:\\Windows\\ccmcache\\2\\VCRedist_x64.exe /quiet /norestart"

  phase_2:
    name: "SCCM: Package Cache File Writes"
    technique: ""
    count: 6
    log_factory: sysmon.file_create
    spread_seconds: 90
    delay_after_prev: [3, 10]
    params:
      dest_host: "{inject_malicious_host}"
      target_user: "{inject_malicious_user}"
      target_filename: "C:\\Windows\\ccmcache\\1\\7-Zip-23.01-x64.msi"

  phase_3:
    name: "SCCM: Service Account Logon"
    technique: ""
    count: 3
    log_factory: successful_logon
    spread_seconds: 30
    delay_after_prev: [5, 15]
    params:
      target_user: "{inject_malicious_user}"
      source_ip: "{attacker_ip}"
      dest_host: "{inject_malicious_host}"
