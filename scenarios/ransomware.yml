meta:
  name: "Ransomware: Lateral Movement to Encryption"
  difficulty: hard
  answer: INCIDENT
  mitre_techniques:
    - id: T1021.002
      name: "Remote Services: SMB/Windows Admin Shares"
    - id: T1570
      name: "Lateral Tool Transfer"
    - id: T1490
      name: "Inhibit System Recovery"
    - id: T1486
      name: "Data Encrypted for Impact"
    - id: T1070.001
      name: "Indicator Removal: Clear Windows Event Logs"
  hint: "vssadmin delete shadows followed by mass file creation with .locked extension across multiple hosts"
  alert:
    rule_id: MASS_FILE_OPERATION
    severity: CRITICAL
    summary: "vssadmin.exe shadow copy deletion detected on {inject_malicious_host} by {inject_malicious_user}"
    description: "High-confidence ransomware precursor: shadow copies being deleted is a near-universal step before file encryption. Isolate affected host immediately and review lateral movement indicators."

world_overrides:
  attacker_ip: "10.0.0.99"
  inject_malicious_host: "DC01"
  inject_malicious_user: "svc_deploy"

phases:
  phase_1:
    name: "Lateral Movement: SMB Spread"
    technique: T1021.002
    count: 4
    log_factory: successful_logon
    spread_seconds: 60
    delay_after_prev: [5, 20]
    params:
      source_ip: "{attacker_ip}"
      dest_host: "{inject_malicious_host}"
      target_user: "{inject_malicious_user}"

  phase_2:
    name: "Lateral Tool Transfer"
    technique: T1570
    count: 3
    log_factory: sysmon.file_create
    spread_seconds: 30
    delay_after_prev: [5, 15]
    params:
      dest_host: "{inject_malicious_host}"
      target_user: "{inject_malicious_user}"
      target_filename: "C:\\Windows\\Temp\\enc.exe"

  phase_3:
    name: "Defense Evasion: Delete Shadow Copies"
    technique: T1490
    count: 2
    log_factory: sysmon.process_create
    spread_seconds: 10
    delay_after_prev: [2, 8]
    params:
      dest_host: "{inject_malicious_host}"
      target_user: "{inject_malicious_user}"
      command_line: "vssadmin.exe delete shadows /all /quiet"

  phase_4:
    name: "Impact: Encrypt Files"
    technique: T1486
    count: 10
    log_factory: sysmon.file_create
    spread_seconds: 120
    delay_after_prev: [0, 5]
    params:
      dest_host: "{inject_malicious_host}"
      target_user: "{inject_malicious_user}"
      target_filename: "C:\\Users\\Public\\Documents\\README.locked"

  phase_5:
    name: "Defense Evasion: Clear Event Logs"
    technique: T1070.001
    count: 1
    log_factory: log_cleared
    spread_seconds: 5
    delay_after_prev: [2, 10]
    params:
      dest_host: "{inject_malicious_host}"
      target_user: "{inject_malicious_user}"
